<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Force PWA Update - BackstageOS</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            background: white;
            color: black;
            text-align: center;
        }
        .update-btn {
            background: #007AFF;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        .status {
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <h1>Force PWA Update</h1>
    <p>This page will force your PWA to update to show the white background and proper Dynamic Island positioning.</p>
    
    <div id="status" class="status">
        Ready to force update...
    </div>
    
    <button onclick="forceUpdate()" class="update-btn">Force Update PWA Cache</button>
    <button onclick="clearAllData()" class="update-btn">Clear All Data & Reload</button>
    
    <script>
        async function forceUpdate() {
            const status = document.getElementById('status');
            status.innerHTML = 'Starting force update...';
            
            try {
                // Step 1: Clear all caches
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    status.innerHTML = `Clearing ${cacheNames.length} caches...`;
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                }
                
                // Step 2: Unregister service worker
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    status.innerHTML = 'Unregistering service workers...';
                    await Promise.all(registrations.map(reg => reg.unregister()));
                }
                
                // Step 3: Clear local storage
                localStorage.clear();
                sessionStorage.clear();
                
                status.innerHTML = 'Cleared all data! Reloading with cache bust...';
                
                // Step 4: Reload with cache busting
                setTimeout(() => {
                    window.location.href = '/?force-update=' + Date.now() + '&v=4.0.0';
                }, 1000);
                
            } catch (error) {
                status.innerHTML = 'Error: ' + error.message;
                console.error(error);
            }
        }
        
        async function clearAllData() {
            const status = document.getElementById('status');
            status.innerHTML = 'Clearing ALL browser data...';
            
            try {
                // Clear everything possible
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                }
                
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(registrations.map(reg => reg.unregister()));
                }
                
                localStorage.clear();
                sessionStorage.clear();
                
                // Try to clear IndexedDB
                if ('indexedDB' in window) {
                    await new Promise((resolve) => {
                        const deleteReq = indexedDB.deleteDatabase('BackstageOS');
                        deleteReq.onsuccess = () => resolve();
                        deleteReq.onerror = () => resolve();
                    });
                }
                
                status.innerHTML = 'All data cleared! Hard reloading...';
                
                // Force hard reload
                setTimeout(() => {
                    window.location.replace('/?hard-reload=' + Date.now());
                }, 500);
                
            } catch (error) {
                status.innerHTML = 'Error: ' + error.message;
                console.error(error);
            }
        }
    </script>
</body>
</html>
